services:
  - type: web
    name: thumbnail-arena
    runtime: node
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: arena-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
